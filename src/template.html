<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Sahel — A Libyan coastal restaurant celebrating the flavors, warmth, and culture of Libya's Mediterranean coastline."
    />
    <title>Sahel — Libyan Coastal Cuisine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Karla:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="site-header" role="banner">
      <div class="header-inner">
        <div class="logo" aria-label="Sahel Restaurant">
          <span class="logo-arabic" aria-hidden="true">ساحل</span>
          <div class="logo-text">
            <span class="logo-name">SAHEL</span>
            <span class="logo-tagline">Libyan Coastal Cuisine</span>
          </div>
        </div>

        <nav class="site-nav" aria-label="Main navigation">
          <button class="nav-btn btn-active" aria-current="page">Home</button>
          <button class="nav-btn">Menu</button>
          <button class="nav-btn">Contact</button>
        </nav>

        <button class="nav-toggle" aria-label="Toggle navigation menu" aria-expanded="false">
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
        </button>
      </div>
    </header>

    <main id="content" role="main" tabindex="-1"></main>

    <footer class="site-footer" role="contentinfo">
      <p class="footer-text">
        &copy; 2024 Sahel &mdash; 14 Corniche Road, Tripoli, Libya
      </p>
    </footer>
  </body>
</html>
